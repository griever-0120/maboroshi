name: Fetch Spirits

on:
  schedule:
    - cron: '0 22 * * *'  # 07:00 JST
    - cron: '0 0 * * *'   # 09:00 JST
    - cron: '0 3 * * *'   # 12:00 JST
    - cron: '0 6 * * *'   # 15:00 JST
    - cron: '0 9 * * *'   # 18:00 JST
    - cron: '0 11 * * *'  # 20:00 JST
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run fetch_spirits.py
        env:
          SPIRITS_URL: ${{ vars.SPIRITS_URL }}
        run: python fetch_spirits.py

      - name: Commit spirits.csv if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spirits.csv
          git diff --cached --quiet || git commit -m "chore: update spirits.csv"
          git push
