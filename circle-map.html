<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>円描画マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; display: flex; flex-direction: column; height: 100vh; }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #16213e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      flex-wrap: wrap;
      z-index: 1000;
    }

    header h1 { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; }

    .input-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
      flex-wrap: wrap;
    }

    input[type="text"] {
      background: #0f3460;
      border: 1px solid #2a5298;
      color: #fff;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 14px;
      width: 160px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #4285F4; }
    input[type="text"]::placeholder { color: #667; }

    button {
      background: #4285F4;
      color: #fff;
      border: none;
      padding: 7px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    button:hover { background: #3367d6; }

    .btn-clear { background: #555; }
    .btn-clear:hover { background: #777; }

    select#dateFilter {
      background: #0f3460;
      border: 1px solid #2a5298;
      color: #fff;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select#dateFilter:focus { border-color: #4285F4; }
    select#dateFilter option { background: #0f3460; }

    .divider { width: 1px; height: 24px; background: #334; flex-shrink: 0; }

    .legend {
      display: flex;
      gap: 10px;
      font-size: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .legend-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid;
      margin-right: 3px;
      vertical-align: middle;
    }
    .dot-blue  { border-color: #4499ff; background: rgba(68,153,255,0.2); }
    .dot-red   { border-color: #ff5555; background: rgba(255,85,85,0.15); }

    .legend-spirit {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
    }
    .si { width: 18px; height: 18px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; }
    .si-fire  { background: #e05020; }
    .si-water { background: #1a7acc; }
    .si-wind  { background: #20a090; }
    .si-earth { background: #7a6020; }

    #map { flex: 1; width: 100%; }

    #status {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
    }
    #status.show { opacity: 1; }

    .error { color: #ff7b7b; font-size: 13px; display: none; }
    .error.show { display: block; }

    /* GeoHex トグル */
    .hex-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .hex-toggle input[type="checkbox"] { cursor: pointer; accent-color: #4285F4; }
    .hex-swatch { display: inline-block; width: 14px; height: 10px; border-radius: 2px; border: 2px solid; }
    .hs3 { border-color: #cc44ff; background: rgba(204,68,255,0.15); }
    .hs4 { border-color: #ff0088; background: rgba(255,0,136,0.12); }
    .hs5 { border-color: #00ccff; background: rgba(0,204,255,0.12); }

    /* バス停マーカー */
    .bus-marker {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: #fff;
      background: #4a5568;
      border: 1.5px solid rgba(255,255,255,0.5);
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    /* 精霊マーカー */
    .spirit-marker {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    .sm-fire  { background: #e05020; }
    .sm-water { background: #1a7acc; }
    .sm-wind  { background: #20a090; }
    .sm-earth { background: #7a6020; }
  </style>
</head>
<body>

<header>
  <h1>🗺 円描画マップ</h1>
  <div class="input-group">
    <input type="text" id="lat" style="display:none" />
    <input type="text" id="lng" style="display:none" />
    <button class="btn-clear" onclick="clearCircles()">クリア</button>
    <span class="error" id="err" style="display:none"></span>
    <div class="divider"></div>
    <select id="dateFilter" onchange="onDateChange()"></select>
  </div>
  <div class="legend">
    <span><span class="legend-dot dot-blue"></span>750m</span>
    <span><span class="legend-dot dot-red"></span>3km</span>
    <div class="divider"></div>
    <span class="legend-spirit"><span class="si si-fire"><i class="fa-solid fa-fire"></i></span>炎</span>
    <span class="legend-spirit"><span class="si si-water"><i class="fa-solid fa-droplet"></i></span>水</span>
    <span class="legend-spirit"><span class="si si-wind"><i class="fa-solid fa-wind"></i></span>風</span>
    <span class="legend-spirit"><span class="si si-earth"><i class="fa-solid fa-mountain"></i></span>大地</span>
    <div class="divider"></div>
    <label class="hex-toggle"><input type="checkbox" id="hex3"><span class="hex-swatch hs3"></span>Lv3</label>
    <label class="hex-toggle"><input type="checkbox" id="hex4"><span class="hex-swatch hs4"></span>Lv4</label>
    <label class="hex-toggle"><input type="checkbox" id="hex5"><span class="hex-swatch hs5"></span>Lv5</label>
    <div class="divider"></div>
    <label class="hex-toggle"><input type="checkbox" id="busToggle"><span class="si" style="background:#4a5568;width:14px;height:14px;font-size:8px;"><i class="fa-solid fa-bus"></i></span>バス停</label>
  </div>
</header>

<div id="map"></div>
<div id="status"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* GeoHex v3 - derived from https://github.com/leon-win/geohex (MIT) */
var GeoHex = (function () {
  var BASE = 20037508.34;
  var K    = Math.tan(Math.PI / 6);  // tan(30°)
  var DEG  = Math.tan(Math.PI / 3);  // tan(60°)

  function calcHexSize(level) { return BASE / Math.pow(3, level + 3); }

  function loc2xy(lon, lat) {
    return {
      x: lon * BASE / 180,
      y: Math.log(Math.tan((90 + lat) * Math.PI / 360)) / (Math.PI / 180) * BASE / 180
    };
  }

  function xy2loc(x, y) {
    return {
      lon: x / BASE * 180,
      lat: 180 / Math.PI * (Math.atan(Math.exp(y / BASE * Math.PI)) * 2 - Math.PI / 2)
    };
  }

  function adjustXY(x, y, level) {
    var maxSteps = Math.pow(3, level + 2);
    var steps = Math.abs(x - y);
    if (steps === maxSteps && x > y) return { x: y, y: x };
    if (steps > maxSteps) {
      var dif = steps - maxSteps;
      var difX = Math.floor(dif / 2);
      var difY = dif - difX;
      if (x > y) return { x: y + difY + difX, y: x - difX - difY };
      if (y > x) return { x: y - difY - difX, y: x + difX + difY };
    }
    return { x: x, y: y };
  }

  function getXYByLocation(lat, lon, level) {
    var size  = calcHexSize(level);
    var unitX = 6 * size, unitY = 6 * size * K;
    var m     = loc2xy(lon, lat);
    var posX  = (m.x + m.y / K) / unitX;
    var posY  = (m.y - K * m.x)  / unitY;
    var X0 = Math.floor(posX), Y0 = Math.floor(posY);
    var XQ = posX - X0,        YQ = posY - Y0;
    var x  = Math.round(posX), y  = Math.round(posY);
    if (YQ > -XQ + 1) {
      if (YQ < 2 * XQ && YQ > 0.5 * XQ) { x = X0 + 1; y = Y0 + 1; }
    } else if (YQ < -XQ + 1) {
      if (YQ > 2 * XQ - 1 && YQ < 0.5 * XQ + 0.5) { x = X0; y = Y0; }
    }
    return adjustXY(x, y, level);
  }

  function getCellCenter(x, y, level) {
    var size  = calcHexSize(level);
    var unitX = 6 * size, unitY = 6 * size * K;
    var latM  = (K * x * unitX + y * unitY) / 2;
    var lonM  = (latM - y * unitY) / K;
    return xy2loc(lonM, latM);
  }

  function getHexCoords(lat, lon, level) {
    var size = calcHexSize(level);
    var m    = loc2xy(lon, lat);
    var TOP    = xy2loc(m.x, m.y + DEG * size).lat;
    var BOTTOM = xy2loc(m.x, m.y - DEG * size).lat;
    var LEFT   = xy2loc(m.x - 2 * size, m.y).lon;
    var RIGHT  = xy2loc(m.x + 2 * size, m.y).lon;
    var CL     = xy2loc(m.x - 1 * size, m.y).lon;
    var CR     = xy2loc(m.x + 1 * size, m.y).lon;
    return [[lat, LEFT],[TOP, CL],[TOP, CR],[lat, RIGHT],[BOTTOM, CR],[BOTTOM, CL]];
  }

  return { BASE: BASE, K: K, calcHexSize: calcHexSize, loc2xy: loc2xy, xy2loc: xy2loc,
           getXYByLocation: getXYByLocation, getCellCenter: getCellCenter, getHexCoords: getHexCoords };
})();
</script>
<script>
  var map = L.map('map', { zoomControl: true }).setView([33.5897, 130.3993], 13);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © <a href="https://www.esri.com/">Esri</a>',
    maxZoom: 19
  }).addTo(map);

  var circles = [];
  var centerMarker = null;
  var spiritMarkers = [];

  var SPIRIT_CONFIG = {
    '炎の精霊': { cls: 'sm-fire',  icon: 'fa-fire'     },
    '水の精霊': { cls: 'sm-water', icon: 'fa-droplet'  },
    '風の精霊': { cls: 'sm-wind',  icon: 'fa-wind'     },
    '大地の精霊':{ cls: 'sm-earth', icon: 'fa-mountain' },
  };

  function showStatus(msg) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2500);
  }

  // ---- 円描画 ----
  function draw() {
    var latVal = document.getElementById('lat').value.trim();
    var lngVal = document.getElementById('lng').value.trim();
    var err = document.getElementById('err');
    var lat = parseFloat(latVal);
    var lng = parseFloat(lngVal);
    if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) {
      err.classList.add('show'); return;
    }
    err.classList.remove('show');
    clearCircles();
    var c1 = L.circle([lat, lng], { radius: 750,  color: '#4499ff', weight: 2.5, opacity: 0.9, fillColor: '#4499ff', fillOpacity: 0.07 }).addTo(map);
    var c2 = L.circle([lat, lng], { radius: 3000, color: '#ff5555', weight: 2.5, opacity: 0.9, fillColor: '#ff5555', fillOpacity: 0.05 }).addTo(map);
    centerMarker = L.marker([lat, lng], { interactive: false })
      .addTo(map);
    circles = [c1, c2];
    map.fitBounds(c2.getBounds(), { padding: [30, 30] });
    showStatus('中心: ' + lat.toFixed(6) + ', ' + lng.toFixed(6));
  }

  function clearCircles() {
    circles.forEach(function(c) { map.removeLayer(c); });
    circles = [];
    if (centerMarker) { map.removeLayer(centerMarker); centerMarker = null; }
  }

  // ---- 精霊プロット ----
  var allSpiritData = [];

  function parseCSV(text) {
    var lines = text.split(/\r?\n/);
    var data = [];
    for (var i = 1; i < lines.length; i++) {
      var cols = lines[i].split(',');
      if (cols.length < 4) continue;
      var date = cols[0].trim();
      var name = cols[1].trim();
      var lat  = parseFloat(cols[2]);
      var lng  = parseFloat(cols[3]);
      if (isNaN(lat) || isNaN(lng)) continue;
      if (!SPIRIT_CONFIG[name]) continue;
      data.push({ date: date, name: name, lat: lat, lng: lng });
    }
    return data;
  }

  function plotData(data) {
    clearSpirits();
    data.forEach(function(row) {
      var cfg = SPIRIT_CONFIG[row.name];
      var icon = L.divIcon({
        className: '',
        html: '<div class="spirit-marker ' + cfg.cls + '"><i class="fa-solid ' + cfg.icon + '"></i></div>',
        iconSize: [28, 28],
        iconAnchor: [14, 14],
        popupAnchor: [0, -16]
      });
      var m = L.marker([row.lat, row.lng], { icon: icon })
        .bindPopup('<b>' + row.name + '</b><br>' + row.date + '<br>' + row.lat.toFixed(6) + ', ' + row.lng.toFixed(6))
        .addTo(map);
      (function(lat, lng, marker) {
        marker.on('click', function() {
          document.getElementById('lat').value = lat;
          document.getElementById('lng').value = lng;
          draw();
          marker.openPopup();
        });
      })(row.lat, row.lng, m);
      spiritMarkers.push(m);
    });
    showStatus(spiritMarkers.length + ' 件の精霊をプロットしました');
  }

  function buildDateSelector(data) {
    var dates = [];
    data.forEach(function(row) { if (dates.indexOf(row.date) === -1) dates.push(row.date); });
    dates.sort(function(a, b) { return b.localeCompare(a); }); // 降順

    var sel = document.getElementById('dateFilter');
    sel.innerHTML = '';
    var optAll = document.createElement('option');
    optAll.value = 'all';
    optAll.textContent = 'all';
    sel.appendChild(optAll);
    dates.forEach(function(d) {
      var opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d;
      sel.appendChild(opt);
    });

    // 今日の日付を初期選択（なければ先頭=all）
    var today = new Date();
    var mm = String(today.getMonth() + 1).padStart(2, '0');
    var dd = String(today.getDate()).padStart(2, '0');
    var todayStr = today.getFullYear() + '/' + mm + '/' + dd;
    // CSVの日付フォーマットに合わせて複数パターン試す
    var found = dates.some(function(d) { return d === todayStr; });
    if (found) {
      sel.value = todayStr;
    } else {
      // ハイフン区切りでも試す
      var todayHyphen = today.getFullYear() + '-' + mm + '-' + dd;
      found = dates.some(function(d) { return d === todayHyphen; });
      sel.value = found ? todayHyphen : 'all';
    }
  }

  function onDateChange() {
    var sel = document.getElementById('dateFilter');
    var val = sel.value;
    if (val === 'all') {
      plotData(allSpiritData);
    } else {
      plotData(allSpiritData.filter(function(row) { return row.date === val; }));
    }
  }

  function fetchCSV() {
    fetch('spirits.csv')
      .then(function(res) {
        if (!res.ok) throw new Error('spirits.csv が見つかりません');
        return res.text();
      })
      .then(function(text) {
        allSpiritData = parseCSV(text);
        buildDateSelector(allSpiritData);
        onDateChange();
      })
      .catch(function(err) { showStatus('⚠ ' + err.message); });
  }

  function clearSpirits() {
    spiritMarkers.forEach(function(m) { map.removeLayer(m); });
    spiritMarkers = [];
  }

  // ---- GeoHex グリッド ----
  var HEX_STYLES = {
    3: { color: '#cc44ff', weight: 1.5, opacity: 0.85, fillColor: '#cc44ff', fillOpacity: 0.06 },
    4: { color: '#ff0088', weight: 1.5, opacity: 0.85, fillColor: '#ff0088', fillOpacity: 0.05 },
    5: { color: '#00ccff', weight: 1.5, opacity: 0.85, fillColor: '#00ccff', fillOpacity: 0.05 }
  };
  var hexLayers = {
    3: L.layerGroup(),
    4: L.layerGroup(),
    5: L.layerGroup()
  };

  function renderHexLevel(level) {
    hexLayers[level].clearLayers();
    var size  = GeoHex.calcHexSize(level);
    var unitX = 6 * size;
    var unitY = 6 * size * GeoHex.K;
    var stepX = unitX / 2;
    var stepY = unitY / 2;

    var bounds = map.getBounds();
    var swM = GeoHex.loc2xy(bounds.getWest(),  bounds.getSouth());
    var neM = GeoHex.loc2xy(bounds.getEast(),  bounds.getNorth());

    var seen = {}, count = 0, MAX = 400;

    outer:
    for (var mx = swM.x - unitX; mx <= neM.x + unitX; mx += stepX) {
      for (var my = swM.y - unitY; my <= neM.y + unitY; my += stepY) {
        var loc = GeoHex.xy2loc(mx, my);
        var xy  = GeoHex.getXYByLocation(loc.lat, loc.lon, level);
        var key = xy.x + '_' + xy.y;
        if (seen[key]) continue;
        seen[key] = true;
        if (++count > MAX) break outer;
        var ctr    = GeoHex.getCellCenter(xy.x, xy.y, level);
        var coords = GeoHex.getHexCoords(ctr.lat, ctr.lon, level);
        L.polygon(coords, HEX_STYLES[level]).addTo(hexLayers[level]);
      }
    }
  }

  function updateHexGrid() {
    [3, 4, 5].forEach(function(lv) {
      if (document.getElementById('hex' + lv).checked) renderHexLevel(lv);
    });
  }

  var hexDebounce = null;
  map.on('moveend zoomend', function() {
    clearTimeout(hexDebounce);
    hexDebounce = setTimeout(updateHexGrid, 150);
  });

  [3, 4, 5].forEach(function(lv) {
    document.getElementById('hex' + lv).addEventListener('change', function() {
      if (this.checked) {
        hexLayers[lv].addTo(map);
        renderHexLevel(lv);
      } else {
        hexLayers[lv].clearLayers();
        map.removeLayer(hexLayers[lv]);
      }
    });
  });

  // ---- バス停プロット ----
  var busLayer = L.layerGroup();
  var busLoaded = false;
  var BUS_MIN_ZOOM = 13;  // この値以上のズームでのみ表示

  function updateBusVisibility() {
    if (!document.getElementById('busToggle').checked) return;
    if (map.getZoom() >= BUS_MIN_ZOOM) {
      if (!map.hasLayer(busLayer)) busLayer.addTo(map);
    } else {
      if (map.hasLayer(busLayer)) map.removeLayer(busLayer);
    }
  }

  function loadBusStops() {
    if (busLoaded) { updateBusVisibility(); return; }
    fetch('busstops.json')
      .then(function(res) {
        if (!res.ok) throw new Error('busstops.json が見つかりません');
        return res.json();
      })
      .then(function(data) {
        busLoaded = true;
        var busIcon = L.divIcon({
          className: '',
          html: '<div class="bus-marker"><i class="fa-solid fa-bus"></i></div>',
          iconSize: [22, 22],
          iconAnchor: [11, 11],
          popupAnchor: [0, -14]
        });
        data.forEach(function(stop) {
          L.marker([stop.lat, stop.lng], { icon: busIcon })
            .bindPopup(
              '<b><i class="fa-solid fa-bus"></i> ' + stop.name + '</b><br>' +
              stop.lat.toFixed(6) + ', ' + stop.lng.toFixed(6)
            )
            .addTo(busLayer);
        });
        updateBusVisibility();
        showStatus('バス停 ' + data.length + ' 件をプロットしました');
      })
      .catch(function(err) { showStatus('⚠ ' + err.message); });
  }

  document.getElementById('busToggle').addEventListener('change', function() {
    if (this.checked) {
      loadBusStops();
    } else {
      map.removeLayer(busLayer);
    }
  });

  map.on('zoomend', updateBusVisibility);

  // ページ読込時に自動でCSV取得
  fetchCSV();

  // Enter キーで描画
  document.getElementById('lat').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('lng').focus(); });
  document.getElementById('lng').addEventListener('keydown', function(e) { if (e.key === 'Enter') draw(); });

  // 貼り付け: "lat, lng" 形式を自動分割
  document.getElementById('lat').addEventListener('paste', function(e) {
    var text = (e.clipboardData || window.clipboardData).getData('text').trim();
    var parts = text.split(/[,\s]+/);
    if (parts.length >= 2) {
      e.preventDefault();
      document.getElementById('lat').value = parts[0];
      document.getElementById('lng').value = parts[1];
      draw();
    }
  });
</script>
</body>
</html>
