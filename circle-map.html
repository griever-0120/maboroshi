<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>円描画マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      /* Apple system colors (light) */
      --sys-blue:   #007AFF;
      --sys-blue-2: #0066D6;
      --sys-red:    #FF3B30;
      --sys-orange: #FF9500;
      --sys-teal:   #30B0C7;
      --sys-green:  #34C759;
      --sys-purple: #AF52DE;
      --sys-pink:   #FF2D55;
      --sys-brown:  #A2845E;
      --sys-gray:   #8E8E93;
      --sys-gray-2: #AEAEB2;
      --sys-gray-3: #C7C7CC;
      --sys-gray-4: #D1D1D6;
      --sys-gray-5: #E5E5EA;
      --sys-gray-6: #F2F2F7;

      --label:        rgba(0,0,0,0.88);
      --label-2:      rgba(60,60,67,0.78);
      --label-3:      rgba(60,60,67,0.56);
      --label-4:      rgba(60,60,67,0.36);
      --separator:    rgba(60,60,67,0.16);
      --hair:         rgba(60,60,67,0.10);

      --panel-bg:     rgba(255,255,255,0.72);
      --panel-stroke: rgba(255,255,255,0.7);
      --panel-shadow: 0 10px 40px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
      --chip-bg:      rgba(118,118,128,0.12);
      --chip-bg-hover:rgba(118,118,128,0.18);

      --radius-panel: 18px;
      --radius-chip:  10px;
      --radius-pill:  999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: var(--label);
      background: #eef2f6;
      overflow: hidden;
    }

    /* ---- Map fills the screen; panel floats above ---- */
    #map {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #eef2f6;
    }

    /* Leaflet attribution — make it match Apple's quiet footer */
    .leaflet-control-attribution {
      background: rgba(255,255,255,0.72) !important;
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 8px 0 0 0;
      font-size: 10px !important;
      color: var(--label-3) !important;
      padding: 3px 8px !important;
    }
    .leaflet-control-attribution a { color: var(--label-2) !important; }

    /* Leaflet zoom control — Apple Maps style */
    .leaflet-bar {
      border: none !important;
      box-shadow: var(--panel-shadow) !important;
      border-radius: 12px !important;
      overflow: hidden;
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }
    .leaflet-bar a {
      background: rgba(255,255,255,0.82) !important;
      color: var(--label) !important;
      border-bottom: 1px solid var(--hair) !important;
      width: 36px !important;
      height: 36px !important;
      line-height: 36px !important;
      font-size: 18px !important;
      font-weight: 300 !important;
    }
    .leaflet-bar a:last-child { border-bottom: none !important; }
    .leaflet-bar a:hover { background: rgba(255,255,255,0.95) !important; }
    .leaflet-top.leaflet-left { top: 16px; left: 16px; }

    /* -------- Floating panel -------- */
    .panel {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: min(960px, calc(100vw - 32px));
      background: var(--panel-bg);
      backdrop-filter: saturate(180%) blur(30px);
      -webkit-backdrop-filter: saturate(180%) blur(30px);
      border: 0.5px solid var(--panel-stroke);
      border-radius: var(--radius-panel);
      box-shadow: var(--panel-shadow);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .panel-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--label);
      padding: 0 4px 0 6px;
      white-space: nowrap;
    }
    .panel-title .title-mark {
      width: 24px; height: 24px;
      border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      /* 4属性（炎→風→水→大地）を循環させた精霊カラー */
      background:
        conic-gradient(from 210deg,
          var(--sys-orange) 0deg,
          #FF2D55 60deg,
          var(--sys-purple) 130deg,
          var(--sys-blue) 200deg,
          var(--sys-teal) 260deg,
          var(--sys-brown) 320deg,
          var(--sys-orange) 360deg);
      color: #fff;
      font-size: 12px;
      box-shadow:
        0 2px 6px rgba(0,0,0,0.18),
        inset 0 0.5px 0 rgba(255,255,255,0.5),
        inset 0 0 0 0.5px rgba(255,255,255,0.25);
      text-shadow: 0 0 6px rgba(255,255,255,0.55);
    }

    .divider-v {
      width: 1px;
      align-self: stretch;
      background: var(--separator);
      margin: 4px 2px;
    }

    /* Buttons */
    .btn {
      appearance: none;
      border: none;
      background: var(--chip-bg);
      color: var(--label);
      padding: 7px 14px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s ease, transform 0.08s ease;
      font-family: inherit;
    }
    .btn:hover { background: var(--chip-bg-hover); }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--sys-blue);
      color: #fff;
    }
    .btn-primary:hover { background: var(--sys-blue-2); }
    .btn .ic { font-size: 11px; color: var(--label-2); }
    .btn-primary .ic { color: rgba(255,255,255,0.85); }

    /* Inputs (kept hidden in original; preserve class) */
    input[type="text"].apple-input {
      background: rgba(255,255,255,0.7);
      border: 0.5px solid var(--separator);
      color: var(--label);
      padding: 7px 12px;
      border-radius: 10px;
      font-size: 13px;
      width: 150px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    input[type="text"].apple-input:focus {
      border-color: var(--sys-blue);
      box-shadow: 0 0 0 3px rgba(0,122,255,0.2);
    }

    /* Select — Apple style pill */
    .select-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }
    .select-wrap::after {
      content: "";
      position: absolute;
      right: 10px;
      top: 50%;
      width: 7px; height: 7px;
      border-right: 1.5px solid var(--label-2);
      border-bottom: 1.5px solid var(--label-2);
      transform: translateY(-70%) rotate(45deg);
      pointer-events: none;
    }
    select#dateFilter {
      appearance: none;
      -webkit-appearance: none;
      background: var(--chip-bg);
      border: none;
      color: var(--label);
      padding: 7px 28px 7px 14px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    select#dateFilter:hover { background: var(--chip-bg-hover); }
    select#dateFilter option { background: #fff; color: var(--label); }

    /* Legend dots (radius circles) */
    .legend {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--label-2);
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--chip-bg);
      border-radius: var(--radius-pill);
      font-weight: 500;
      color: var(--label);
      font-size: 12px;
    }
    .legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1.5px solid;
    }
    .dot-blue  { border-color: var(--sys-blue);   background: rgba(0,122,255,0.18); }
    .dot-red   { border-color: var(--sys-red);    background: rgba(255,59,48,0.15); }

    /* Spirit chips in legend */
    .si {
      width: 18px; height: 18px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 9px;
      color: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.15), inset 0 0.5px 0 rgba(255,255,255,0.4);
    }
    .si-fire  { background: linear-gradient(180deg, #FF8A5B, var(--sys-orange)); }
    .si-water { background: linear-gradient(180deg, #4CA3FF, var(--sys-blue)); }
    .si-wind  { background: linear-gradient(180deg, #5FCFC2, var(--sys-teal)); }
    .si-earth { background: linear-gradient(180deg, #C2A378, var(--sys-brown)); }

    /* Toggles — Apple segmented control vibe (pill with icon) */
    .hex-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      padding: 5px 10px;
      border-radius: var(--radius-pill);
      background: var(--chip-bg);
      color: var(--label);
      font-weight: 500;
      transition: background 0.15s;
      position: relative;
    }
    .hex-toggle:hover { background: var(--chip-bg-hover); }
    .hex-toggle input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 30px;
      height: 18px;
      border-radius: 999px;
      background: var(--sys-gray-4);
      position: relative;
      cursor: pointer;
      transition: background 0.2s ease;
      flex-shrink: 0;
    }
    .hex-toggle input[type="checkbox"]::after {
      content: "";
      position: absolute;
      top: 1.5px;
      left: 1.5px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.25);
      transition: transform 0.2s ease;
    }
    .hex-toggle input[type="checkbox"]:checked { background: var(--sys-green); }
    .hex-toggle input[type="checkbox"]:checked::after { transform: translateX(12px); }

    .hex-swatch {
      display: inline-block;
      width: 14px; height: 10px;
      border-radius: 3px;
      border: 1.5px solid;
    }
    .hs3 { border-color: var(--sys-purple); background: rgba(175,82,222,0.15); }
    .hs4 { border-color: var(--sys-pink);   background: rgba(255,45,85,0.14); }
    .hs5 { border-color: var(--sys-teal);   background: rgba(48,176,199,0.14); }

    /* Error text */
    .error {
      color: var(--sys-red);
      font-size: 12px;
      display: none;
      font-weight: 500;
    }
    .error.show { display: inline-block; }

    /* Status pill (toast) */
    #status {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(255,255,255,0.82);
      backdrop-filter: saturate(180%) blur(30px);
      -webkit-backdrop-filter: saturate(180%) blur(30px);
      border: 0.5px solid var(--panel-stroke);
      color: var(--label);
      padding: 10px 18px;
      border-radius: var(--radius-pill);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: var(--panel-shadow);
    }
    #status.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ---- Map markers ---- */
    .bus-marker {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: #fff;
      background: linear-gradient(180deg, #A8A8AD, #6E6E73);
      border: 1.5px solid rgba(255,255,255,0.95);
      box-shadow: 0 2px 6px rgba(0,0,0,0.22), inset 0 0.5px 0 rgba(255,255,255,0.3);
    }

    .spirit-marker {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.95);
      box-shadow: 0 3px 10px rgba(0,0,0,0.22), inset 0 0.5px 0 rgba(255,255,255,0.4);
    }
    .sm-fire  { background: linear-gradient(180deg, #FF8A5B, var(--sys-orange)); }
    .sm-water { background: linear-gradient(180deg, #4CA3FF, var(--sys-blue)); }
    .sm-wind  { background: linear-gradient(180deg, #5FCFC2, var(--sys-teal)); }
    .sm-earth { background: linear-gradient(180deg, #C2A378, var(--sys-brown)); }

    /* ---- Popup styling ---- */
    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      background: rgba(255,255,255,0.92) !important;
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.08) !important;
      border: 0.5px solid var(--panel-stroke);
    }
    .leaflet-popup-content {
      margin: 12px 16px !important;
      font-size: 13px !important;
      color: var(--label) !important;
      font-family: inherit !important;
      line-height: 1.45 !important;
    }
    .leaflet-popup-content b {
      font-weight: 600;
      letter-spacing: -0.01em;
      font-size: 13.5px;
    }
    .leaflet-popup-tip {
      background: rgba(255,255,255,0.92) !important;
      box-shadow: none !important;
    }
    .leaflet-popup-close-button {
      color: var(--label-3) !important;
      font-size: 20px !important;
      padding: 6px 8px 0 0 !important;
    }

    /* Responsive: stack on narrow */
    @media (max-width: 720px) {
      .panel {
        top: 8px;
        width: calc(100vw - 16px);
        padding: 8px 10px;
        gap: 6px;
      }
      .panel-title { font-size: 14px; }
      .legend { gap: 6px; }
      .legend-item { padding: 3px 8px; font-size: 11px; }
      .hex-toggle { padding: 4px 8px; font-size: 11px; }
      .divider-v { display: none; }
    }
  </style>
</head>
<body>

<div class="panel" role="toolbar" aria-label="マップコントロール">
  <div class="panel-title">
    <span class="title-mark" aria-hidden="true"><i class="fa-solid fa-wand-sparkles"></i></span>
  </div>

  <div class="divider-v"></div>

  <input type="text" id="lat" class="apple-input" style="display:none" />
  <input type="text" id="lng" class="apple-input" style="display:none" />
  <button class="btn" onclick="clearCircles()">
    <i class="fa-solid fa-xmark ic"></i>クリア
  </button>
  <span class="error" id="err"></span>

  <div class="divider-v"></div>

  <div class="select-wrap">
    <select id="dateFilter" onchange="onDateChange()" aria-label="日付フィルター"></select>
  </div>

  <div class="divider-v"></div>

  <div class="legend" aria-label="凡例">
    <span class="legend-item"><span class="legend-dot dot-blue"></span>750m</span>
    <span class="legend-item"><span class="legend-dot dot-red"></span>3km</span>

    <span class="legend-item"><span class="si si-fire"><i class="fa-solid fa-fire"></i></span>炎</span>
    <span class="legend-item"><span class="si si-water"><i class="fa-solid fa-droplet"></i></span>水</span>
    <span class="legend-item"><span class="si si-wind"><i class="fa-solid fa-wind"></i></span>風</span>
    <span class="legend-item"><span class="si si-earth"><i class="fa-solid fa-mountain"></i></span>大地</span>

    <label class="hex-toggle"><input type="checkbox" id="hex3"><span class="hex-swatch hs3"></span>Lv3</label>
    <label class="hex-toggle"><input type="checkbox" id="hex4"><span class="hex-swatch hs4"></span>Lv4</label>
    <label class="hex-toggle"><input type="checkbox" id="hex5"><span class="hex-swatch hs5"></span>Lv5</label>

    <label class="hex-toggle">
      <input type="checkbox" id="busToggle">
      <span class="si" style="background: linear-gradient(180deg, #A8A8AD, #6E6E73); width:14px; height:14px; font-size:7px;">
        <i class="fa-solid fa-bus"></i>
      </span>
      バス停
    </label>
  </div>
</div>

<div id="map"></div>
<div id="status"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* GeoHex v3 - derived from https://github.com/leon-win/geohex (MIT) */
var GeoHex = (function () {
  var BASE = 20037508.34;
  var K    = Math.tan(Math.PI / 6);
  var DEG  = Math.tan(Math.PI / 3);

  function calcHexSize(level) { return BASE / Math.pow(3, level + 3); }

  function loc2xy(lon, lat) {
    return {
      x: lon * BASE / 180,
      y: Math.log(Math.tan((90 + lat) * Math.PI / 360)) / (Math.PI / 180) * BASE / 180
    };
  }

  function xy2loc(x, y) {
    return {
      lon: x / BASE * 180,
      lat: 180 / Math.PI * (Math.atan(Math.exp(y / BASE * Math.PI)) * 2 - Math.PI / 2)
    };
  }

  function adjustXY(x, y, level) {
    var maxSteps = Math.pow(3, level + 2);
    var steps = Math.abs(x - y);
    if (steps === maxSteps && x > y) return { x: y, y: x };
    if (steps > maxSteps) {
      var dif = steps - maxSteps;
      var difX = Math.floor(dif / 2);
      var difY = dif - difX;
      if (x > y) return { x: y + difY + difX, y: x - difX - difY };
      if (y > x) return { x: y - difY - difX, y: x + difX + difY };
    }
    return { x: x, y: y };
  }

  function getXYByLocation(lat, lon, level) {
    var size  = calcHexSize(level);
    var unitX = 6 * size, unitY = 6 * size * K;
    var m     = loc2xy(lon, lat);
    var posX  = (m.x + m.y / K) / unitX;
    var posY  = (m.y - K * m.x)  / unitY;
    var X0 = Math.floor(posX), Y0 = Math.floor(posY);
    var XQ = posX - X0,        YQ = posY - Y0;
    var x  = Math.round(posX), y  = Math.round(posY);
    if (YQ > -XQ + 1) {
      if (YQ < 2 * XQ && YQ > 0.5 * XQ) { x = X0 + 1; y = Y0 + 1; }
    } else if (YQ < -XQ + 1) {
      if (YQ > 2 * XQ - 1 && YQ < 0.5 * XQ + 0.5) { x = X0; y = Y0; }
    }
    return adjustXY(x, y, level);
  }

  function getCellCenter(x, y, level) {
    var size  = calcHexSize(level);
    var unitX = 6 * size, unitY = 6 * size * K;
    var latM  = (K * x * unitX + y * unitY) / 2;
    var lonM  = (latM - y * unitY) / K;
    return xy2loc(lonM, latM);
  }

  function getHexCoords(lat, lon, level) {
    var size = calcHexSize(level);
    var m    = loc2xy(lon, lat);
    var TOP    = xy2loc(m.x, m.y + DEG * size).lat;
    var BOTTOM = xy2loc(m.x, m.y - DEG * size).lat;
    var LEFT   = xy2loc(m.x - 2 * size, m.y).lon;
    var RIGHT  = xy2loc(m.x + 2 * size, m.y).lon;
    var CL     = xy2loc(m.x - 1 * size, m.y).lon;
    var CR     = xy2loc(m.x + 1 * size, m.y).lon;
    return [[lat, LEFT],[TOP, CL],[TOP, CR],[lat, RIGHT],[BOTTOM, CR],[BOTTOM, CL]];
  }

  return { BASE: BASE, K: K, calcHexSize: calcHexSize, loc2xy: loc2xy, xy2loc: xy2loc,
           getXYByLocation: getXYByLocation, getCellCenter: getCellCenter, getHexCoords: getHexCoords };
})();
</script>
<script>
  var map = L.map('map', { zoomControl: true, attributionControl: true }).setView([33.5897, 130.3993], 13);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © <a href="https://www.esri.com/">Esri</a>',
    maxZoom: 19
  }).addTo(map);

  var circles = [];
  var centerMarker = null;
  var spiritMarkers = [];

  var SPIRIT_CONFIG = {
    '炎の精霊': { cls: 'sm-fire',  icon: 'fa-fire'     },
    '水の精霊': { cls: 'sm-water', icon: 'fa-droplet'  },
    '風の精霊': { cls: 'sm-wind',  icon: 'fa-wind'     },
    '大地の精霊':{ cls: 'sm-earth', icon: 'fa-mountain' },
  };

  function showStatus(msg) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2500);
  }

  // ---- 円描画 ----
  function draw() {
    var latVal = document.getElementById('lat').value.trim();
    var lngVal = document.getElementById('lng').value.trim();
    var err = document.getElementById('err');
    var lat = parseFloat(latVal);
    var lng = parseFloat(lngVal);
    if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) {
      err.textContent = '座標が正しくありません';
      err.classList.add('show'); return;
    }
    err.classList.remove('show');
    clearCircles();
    var c1 = L.circle([lat, lng], { radius: 750,  color: '#007AFF', weight: 2, opacity: 0.9, fillColor: '#007AFF', fillOpacity: 0.08 }).addTo(map);
    var c2 = L.circle([lat, lng], { radius: 3000, color: '#FF3B30', weight: 2, opacity: 0.9, fillColor: '#FF3B30', fillOpacity: 0.05 }).addTo(map);
    centerMarker = L.marker([lat, lng], { interactive: false }).addTo(map);
    circles = [c1, c2];
    map.fitBounds(c2.getBounds(), { padding: [30, 30] });
    showStatus('中心: ' + lat.toFixed(6) + ', ' + lng.toFixed(6));
  }

  function clearCircles() {
    circles.forEach(function(c) { map.removeLayer(c); });
    circles = [];
    if (centerMarker) { map.removeLayer(centerMarker); centerMarker = null; }
  }

  // ---- 精霊プロット ----
  var allSpiritData = [];

  function parseCSV(text) {
    var lines = text.split(/\r?\n/);
    var data = [];
    for (var i = 1; i < lines.length; i++) {
      var cols = lines[i].split(',');
      if (cols.length < 4) continue;
      var date = cols[0].trim();
      var name = cols[1].trim();
      var lat  = parseFloat(cols[2]);
      var lng  = parseFloat(cols[3]);
      if (isNaN(lat) || isNaN(lng)) continue;
      if (!SPIRIT_CONFIG[name]) continue;
      data.push({ date: date, name: name, lat: lat, lng: lng });
    }
    return data;
  }

  function plotData(data) {
    clearSpirits();
    data.forEach(function(row) {
      var cfg = SPIRIT_CONFIG[row.name];
      var icon = L.divIcon({
        className: '',
        html: '<div class="spirit-marker ' + cfg.cls + '"><i class="fa-solid ' + cfg.icon + '"></i></div>',
        iconSize: [30, 30],
        iconAnchor: [15, 15],
        popupAnchor: [0, -16]
      });
      var m = L.marker([row.lat, row.lng], { icon: icon })
        .bindPopup('<b>' + row.name + '</b><br>' + row.date + '<br>' + row.lat.toFixed(6) + ', ' + row.lng.toFixed(6))
        .addTo(map);
      (function(lat, lng, marker) {
        marker.on('click', function() {
          document.getElementById('lat').value = lat;
          document.getElementById('lng').value = lng;
          draw();
          marker.openPopup();
        });
      })(row.lat, row.lng, m);
      spiritMarkers.push(m);
    });
    showStatus(spiritMarkers.length + ' 件の精霊をプロットしました');
  }

  function buildDateSelector(data) {
    var dates = [];
    data.forEach(function(row) { if (dates.indexOf(row.date) === -1) dates.push(row.date); });
    dates.sort(function(a, b) { return b.localeCompare(a); });

    var sel = document.getElementById('dateFilter');
    sel.innerHTML = '';
    var optAll = document.createElement('option');
    optAll.value = 'all';
    optAll.textContent = 'すべて';
    sel.appendChild(optAll);
    dates.forEach(function(d) {
      var opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d;
      sel.appendChild(opt);
    });

    var today = new Date();
    var mm = String(today.getMonth() + 1).padStart(2, '0');
    var dd = String(today.getDate()).padStart(2, '0');
    var todayStr = today.getFullYear() + '/' + mm + '/' + dd;
    var found = dates.some(function(d) { return d === todayStr; });
    if (found) {
      sel.value = todayStr;
    } else {
      var todayHyphen = today.getFullYear() + '-' + mm + '-' + dd;
      found = dates.some(function(d) { return d === todayHyphen; });
      sel.value = found ? todayHyphen : 'all';
    }
  }

  function onDateChange() {
    var sel = document.getElementById('dateFilter');
    var val = sel.value;
    if (val === 'all') {
      plotData(allSpiritData);
    } else {
      plotData(allSpiritData.filter(function(row) { return row.date === val; }));
    }
  }

  function fetchCSV() {
    fetch('spirits.csv')
      .then(function(res) {
        if (!res.ok) throw new Error('spirits.csv が見つかりません');
        return res.text();
      })
      .then(function(text) {
        allSpiritData = parseCSV(text);
        buildDateSelector(allSpiritData);
        onDateChange();
      })
      .catch(function(err) { showStatus('⚠ ' + err.message); });
  }

  function clearSpirits() {
    spiritMarkers.forEach(function(m) { map.removeLayer(m); });
    spiritMarkers = [];
  }

  // ---- GeoHex グリッド ----
  var HEX_STYLES = {
    3: { color: '#AF52DE', weight: 1.2, opacity: 0.85, fillColor: '#AF52DE', fillOpacity: 0.07 },
    4: { color: '#FF2D55', weight: 1.2, opacity: 0.85, fillColor: '#FF2D55', fillOpacity: 0.06 },
    5: { color: '#30B0C7', weight: 1.2, opacity: 0.85, fillColor: '#30B0C7', fillOpacity: 0.06 }
  };
  var hexLayers = {
    3: L.layerGroup(),
    4: L.layerGroup(),
    5: L.layerGroup()
  };

  function renderHexLevel(level) {
    hexLayers[level].clearLayers();
    var size  = GeoHex.calcHexSize(level);
    var unitX = 6 * size;
    var unitY = 6 * size * GeoHex.K;
    var stepX = unitX / 2;
    var stepY = unitY / 2;

    var bounds = map.getBounds();
    var swM = GeoHex.loc2xy(bounds.getWest(),  bounds.getSouth());
    var neM = GeoHex.loc2xy(bounds.getEast(),  bounds.getNorth());

    var xSteps = Math.ceil((neM.x - swM.x + 2 * unitX) / stepX);
    var ySteps = Math.ceil((neM.y - swM.y + 2 * unitY) / stepY);
    if (xSteps * ySteps > 8000) {
      showStatus('Lv' + level + ' GeoHex: ズームを拡大してください');
      return;
    }

    var seen = {};

    for (var mx = swM.x - unitX; mx <= neM.x + unitX; mx += stepX) {
      for (var my = swM.y - unitY; my <= neM.y + unitY; my += stepY) {
        var loc = GeoHex.xy2loc(mx, my);
        var xy  = GeoHex.getXYByLocation(loc.lat, loc.lon, level);
        var key = xy.x + '_' + xy.y;
        if (seen[key]) continue;
        seen[key] = true;
        var ctr    = GeoHex.getCellCenter(xy.x, xy.y, level);
        var coords = GeoHex.getHexCoords(ctr.lat, ctr.lon, level);
        L.polygon(coords, HEX_STYLES[level]).addTo(hexLayers[level]);
      }
    }
  }

  function updateHexGrid() {
    [3, 4, 5].forEach(function(lv) {
      if (document.getElementById('hex' + lv).checked) renderHexLevel(lv);
    });
  }

  var hexDebounce = null;
  map.on('moveend zoomend', function() {
    clearTimeout(hexDebounce);
    hexDebounce = setTimeout(updateHexGrid, 150);
  });

  [3, 4, 5].forEach(function(lv) {
    document.getElementById('hex' + lv).addEventListener('change', function() {
      if (this.checked) {
        hexLayers[lv].addTo(map);
        renderHexLevel(lv);
      } else {
        hexLayers[lv].clearLayers();
        map.removeLayer(hexLayers[lv]);
      }
    });
  });

  // ---- バス停プロット ----
  var busLayer = L.layerGroup();
  var busLoaded = false;
  var BUS_MIN_ZOOM = 13;

  function updateBusVisibility() {
    if (!document.getElementById('busToggle').checked) return;
    if (map.getZoom() >= BUS_MIN_ZOOM) {
      if (!map.hasLayer(busLayer)) busLayer.addTo(map);
    } else {
      if (map.hasLayer(busLayer)) map.removeLayer(busLayer);
    }
  }

  function loadBusStops() {
    if (busLoaded) { updateBusVisibility(); return; }
    fetch('busstops.json')
      .then(function(res) {
        if (!res.ok) throw new Error('busstops.json が見つかりません');
        return res.json();
      })
      .then(function(data) {
        busLoaded = true;
        var busIcon = L.divIcon({
          className: '',
          html: '<div class="bus-marker"><i class="fa-solid fa-bus"></i></div>',
          iconSize: [22, 22],
          iconAnchor: [11, 11],
          popupAnchor: [0, -14]
        });
        data.forEach(function(stop) {
          L.marker([stop.lat, stop.lng], { icon: busIcon })
            .bindPopup(
              '<b><i class="fa-solid fa-bus"></i> ' + stop.name + '</b><br>' +
              stop.lat.toFixed(6) + ', ' + stop.lng.toFixed(6)
            )
            .addTo(busLayer);
        });
        updateBusVisibility();
        showStatus('バス停 ' + data.length + ' 件をプロットしました');
      })
      .catch(function(err) { showStatus('⚠ ' + err.message); });
  }

  document.getElementById('busToggle').addEventListener('change', function() {
    if (this.checked) {
      loadBusStops();
    } else {
      map.removeLayer(busLayer);
    }
  });

  map.on('zoomend', updateBusVisibility);

  fetchCSV();

  document.getElementById('lat').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('lng').focus(); });
  document.getElementById('lng').addEventListener('keydown', function(e) { if (e.key === 'Enter') draw(); });

  document.getElementById('lat').addEventListener('paste', function(e) {
    var text = (e.clipboardData || window.clipboardData).getData('text').trim();
    var parts = text.split(/[,\s]+/);
    if (parts.length >= 2) {
      e.preventDefault();
      document.getElementById('lat').value = parts[0];
      document.getElementById('lng').value = parts[1];
      draw();
    }
  });
</script>
</body>
</html>
